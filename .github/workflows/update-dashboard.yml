name: Update World Cup Dashboard

on:
  workflow_dispatch:
  # Scheduled runs disabled: the Live Score Loop owns dashboard updates and a
  # second writer pushing to main at the same time wedges its rebase. Re-enable
  # only when the live loop is off.
  # schedule:
  #   - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update results and recalculate dashboard
        run: python scripts/update_from_fifa.py

      - name: Commit updated dashboard files
        run: |
          git config user.name "worldcup-dashboard-bot"
          git config user.email "worldcup-dashboard-bot@users.noreply.github.com"
          git add data.json leaderboard.csv matches.csv open_questions.csv open_question_review.csv fast_track_review.csv sources_all.csv sources_fifa.csv efi_katash_audit.csv automation_status.json espn_live_debug.csv match_results_cache.json
          git commit -m "Clean auto-update dashboard data" || echo "No changes to commit"
          git push
