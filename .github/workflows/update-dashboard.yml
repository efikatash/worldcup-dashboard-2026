name: Update World Cup Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create automation status file
        run: |
          echo "{
            \"status\": \"ok\",
            \"message\": \"GitHub Action is working\",
            \"updated_at_utc\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"
          }" > automation_status.json

      - name: Commit updated files
        run: |
          git config user.name "worldcup-dashboard-bot"
          git config user.email "worldcup-dashboard-bot@users.noreply.github.com"
          git add automation_status.json
          git commit -m "Update automation status" || echo "No changes to commit"
          git push
