name: Update World Cup Dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub scheduled workflows are not true second-by-second live, but 5 minutes is the practical minimum.
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update FIFA finals, ESPN live scores and open-question trackers
        run: python scripts/update_from_fifa.py

      - name: Commit updated dashboard files
        run: |
          git config user.name "worldcup-dashboard-bot"
          git config user.email "worldcup-dashboard-bot@users.noreply.github.com"
          git add data.json leaderboard.csv matches.csv open_questions.csv open_question_review.csv fast_track_review.csv fifa_live_debug.csv espn_live_debug.csv sources_all.csv sources_fifa.csv efi_katash_audit.csv automation_status.json
          git commit -m "Auto-update dashboard results, ESPN live scores and open questions" || echo "No changes to commit"
          git push
