name: Live Score Loop

# Self-running "live mode": updates the dashboard every 10 minutes on GitHub's
# runner — no dependency on any chat session.
#
# Configured for the 26/6 window (PHT): the loop is armed now but stays idle
# until 04:00 PHT 26/6 (20:00 UTC 25/6), then updates every 10 min until
# 12:00 PHT 26/6 (04:00 UTC 26/6).
#
# GitHub-hosted jobs are capped at 6h, so several scheduled starts cover the
# full 8h window; concurrency makes the later start cleanly replace the earlier one.

on:
  workflow_dispatch:
  schedule:
    # Every 2h across the window (20:00 UTC 25/6 → 04:00 UTC 26/6) so a fresh
    # start always beats the 6h job cap, even if some scheduled runs are dropped.
    - cron: "0 0,2,20,22 * * *"

permissions:
  contents: write

concurrency:
  group: live-score-loop
  cancel-in-progress: true

jobs:
  live-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update every 10 minutes across the 26/6 window (04:00–12:00 PHT)
        run: |
          set +e
          START=$(date -u -d '2026-06-25 20:00' +%s)  # 04:00 PHT 26/6 — do nothing before this
          END=$(date -u -d '2026-06-26 04:00' +%s)    # 12:00 PHT 26/6
          git config user.name "worldcup-dashboard-bot"
          git config user.email "worldcup-dashboard-bot@users.noreply.github.com"
          FILES="data.json leaderboard.csv matches.csv open_questions.csv open_question_review.csv fast_track_review.csv sources_all.csv sources_fifa.csv efi_katash_audit.csv automation_status.json espn_live_debug.csv match_results_cache.json"
          # Stay idle until the window opens (the run may be dispatched early).
          while [ "$(date -u +%s)" -lt "$START" ]; do
            echo "waiting for window: $(date -u +'%H:%M') UTC < 20:00 UTC"
            sleep 60
          done
          while [ "$(date -u +%s)" -lt "$END" ]; do
            echo "=== update $(date -u +'%H:%M') UTC ==="
            # Always start from the latest origin so a concurrent writer can never
            # wedge a half-finished rebase. update_from_fifa.py regenerates the
            # data files from scratch, so a hard reset loses nothing.
            for i in 1 2 3 4 5 6; do
              git fetch origin main && git reset --hard origin/main || { echo "fetch/reset retry $i"; sleep 4; continue; }
              python scripts/update_from_fifa.py
              # Heartbeat: guarantees a visible commit every 10 minutes even when
              # no match data changed, and lets liveness be observed from git alone.
              date -u +'%Y-%m-%dT%H:%M:%SZ' > live_heartbeat.txt
              git add $FILES live_heartbeat.txt
              git commit -m "Live auto-update dashboard data" || { echo "No changes to commit"; break; }
              git push origin HEAD:main && break
              echo "push retry $i"; sleep 4
            done
            [ "$(date -u +%s)" -ge "$END" ] && break
            sleep 600
          done
          echo "Live loop window ended at $(date -u +'%H:%M') UTC"
