name: Live Score Loop

# Self-running "live mode": updates the dashboard every 10 minutes on GitHub's
# runner — no dependency on any chat session.
#
# Configured for the 23/6 match day (4 matches, all in the morning, PHT):
# Argentina–Austria 01:00, France–Iraq 05:00, Norway–Senegal 08:00,
# Jordan–Algeria 11:00. The loop runs from 01:00 PHT 23/6 (17:00 UTC 22/6) until
# ~13:30 PHT 23/6 (05:30 UTC 23/6), ~30m after the last match (11:00) finishes.
#
# GitHub-hosted jobs are capped at 6h, so several scheduled starts cover the
# full window; concurrency makes the later start cleanly replace the earlier one.

on:
  workflow_dispatch:
  schedule:
    # Every 2h across the window (17:00 UTC 22/6 → 05:30 UTC 23/6) so a fresh
    # start always beats the 6h job cap, even if some scheduled runs are dropped.
    - cron: "0 1,3,5,17,19,21,23 * * *"

permissions:
  contents: write

concurrency:
  group: live-score-loop
  cancel-in-progress: true

jobs:
  live-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update every 10 minutes until the 23/6 match day ends (05:30 UTC 23/6)
        run: |
          set +e
          END=$(date -u -d '2026-06-23 05:30' +%s)   # 13:30 PHT 23/6, ~30m after Jordan–Algeria (11:00) ends
          git config user.name "worldcup-dashboard-bot"
          git config user.email "worldcup-dashboard-bot@users.noreply.github.com"
          while [ "$(date -u +%s)" -lt "$END" ]; do
            echo "=== update $(date -u +'%H:%M') UTC ==="
            python scripts/update_from_fifa.py
            git add data.json leaderboard.csv matches.csv open_questions.csv open_question_review.csv fast_track_review.csv sources_all.csv sources_fifa.csv efi_katash_audit.csv automation_status.json espn_live_debug.csv match_results_cache.json
            git commit -m "Live auto-update dashboard data" || echo "No changes to commit"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push retry $i"; sleep 5
            done
            [ "$(date -u +%s)" -ge "$END" ] && break
            sleep 600
          done
          echo "Live loop window ended at $(date -u +'%H:%M') UTC"
