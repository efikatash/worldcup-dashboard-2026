#!/usr/bin/env python3
"""
Step 3 sanity-check updater for the World Cup dashboard.

What this version does:
1. Opens data.json.
2. Writes a small automation timestamp into data.json meta.
3. Creates automation_status.json.
4. Lets GitHub Action commit the result.

After this works, this same file can be upgraded to fetch official match results,
score the workbook, rebuild data.json, and push the live dashboard update.
"""

from __future__ import annotations

import json
from datetime import datetime, timezone
from pathlib import Path

ROOT = Path(__file__).resolve().parents[1]
DATA_PATH = ROOT / "data.json"
STATUS_PATH = ROOT / "automation_status.json"


def now_iso() -> str:
    return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")


def main() -> None:
    if not DATA_PATH.exists():
        raise FileNotFoundError("data.json was not found in the repository root.")

    with DATA_PATH.open("r", encoding="utf-8") as f:
        data = json.load(f)

    meta = data.setdefault("meta", {})
    current_time = now_iso()
    meta["automationStatus"] = "ok"
    meta["lastAutomationCheckUtc"] = current_time
    meta["automationMode"] = "sanity-check-only"
    meta["automationNote"] = (
        "GitHub Action can read and write dashboard files. "
        "FIFA/live result fetching will be added in the next step."
    )

    with DATA_PATH.open("w", encoding="utf-8") as f:
        json.dump(data, f, ensure_ascii=False, indent=2)
        f.write("\n")

    status = {
        "status": "ok",
        "checkedAtUtc": current_time,
        "mode": "sanity-check-only",
        "updatedFiles": ["data.json", "automation_status.json"],
        "nextStep": "Replace this sanity-check script with the real FIFA/result updater.",
    }
    with STATUS_PATH.open("w", encoding="utf-8") as f:
        json.dump(status, f, ensure_ascii=False, indent=2)
        f.write("\n")

    print(f"Dashboard automation sanity check passed at {current_time}")


if __name__ == "__main__":
    main()
